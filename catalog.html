<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Catalog</title></head>
<body>
    <h1>Catalog Cărți</h1>
    <a th:if="${role != null}" href="/adauga">Adaugă carte nouă</a>
    
    <table border="1">
        <tr><th>Titlu</th><th>Autor</th><th>An</th><th>Acțiuni</th></tr>
        <tr th:each="c : ${carti}">
            <td th:text="${c.titlu}"></td>
            <td th:text="${c.autor}"></td>
            <td th:text="${c.an}"></td>
            <td>
                <a th:if="${role != null}" th:href="@{/editeaza/{id}(id=${c.id})}">Editează</a>
                <a th:if="${role != null}" th:href="@{/sterge/{id}(id=${c.id})}">Șterge</a>
            </td>
        </tr>
    </table>

    <a th:href="@{/catalog(pagina=${paginaCurenta-1})}" th:if="${paginaCurenta > 0}">← Previous</a>
    <a th:href="@{/catalog(pagina=${paginaCurenta+1})}" th:if="${paginaCurenta < totalPagini-1}">Next →</a>
    <a href="/logout" th:if="${role != null}">Logout</a>
</body>
</html>
